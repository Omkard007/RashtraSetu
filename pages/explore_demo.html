<style>
body {
    background: #eef2f7;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    transition: 0.3s;
}

/* ===== DARK MODE ===== */
body.dark-mode {
    background: #0d1117;
    color: #ffffff;
}

body.dark-mode .sidebar {
    background: #111827;
}

body.dark-mode .menu-item {
    color: #ffffff;
}

body.dark-mode .menu-item:hover,
body.dark-mode .active {
    background: #1f2937;
}

body.dark-mode .content {
    color: #ffffff;
}

body.dark-mode .modal-content-custom {
    background: #1e1e1e;
    color: #ffffff;
}

body.dark-mode .modal-left p {
    color: #cccccc;
}

body.dark-mode .modal-header h3,
body.dark-mode .modal-right h5 {
    color: #ffffff;
}

body.dark-mode .user-report {
    background: #2a2a2a;
    border-color: #444;
    color: #ffffff;
}

body.dark-mode .user-report:hover {
    background: #333333;
}
/* ===== END DARK MODE ===== */

.sidebar {
    width: 230px;
    height: 100vh;
    background: #0A2647;
    color: #fff;
    position: fixed;
    padding-top: 25px;
    transition: 0.3s;
}

.sidebar h3 {
    text-align: center;
    color: #FFDE59;
    margin-bottom: 25px;
    font-size: 22px;
    font-weight: bold;
}

.menu-item {
    color: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    text-decoration: none;
    transition: 0.3s;
    border-radius: 5px;
    margin: 2px 10px;
}

.menu-item i {
    margin-right: 10px;
}

.menu-item:hover,
.active {
    background: #144272;
}

.content {
    margin-left: 240px;
    padding: 25px;
}

.post-card {
    overflow: hidden;
    position: relative;
    border-radius: 15px;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s, opacity 0.5s;
    opacity: 0;
    transform: translateY(20px);
    animation: cardFadeIn 0.8s forwards;
}

/* (ALL YOUR ORIGINAL CSS REMAINS SAME BELOW – NOT REMOVED) */
