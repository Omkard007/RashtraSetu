<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Page</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        transition: 0.3s;
        background-color: #f4f4f4;
        color: black;
    }

    /* Dark Mode */
    body.dark-mode {
        background-color: #121212;
        color: white;
    }

    /* Header */
    .header {
        padding: 15px;
        text-align: right;
        background-color: #007bff;
        color: white;
    }

    body.dark-mode .header {
        background-color: #1f1f1f;
    }

    /* Dark Mode Toggle Button */
    .toggle-btn {
        padding: 8px 15px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        font-weight: bold;
    }

    /* Layout */
    .container {
        display: flex;
        min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
        width: 220px;
        background-color: #343a40;
        color: white;
        padding: 20px;
        transition: 0.3s;
    }

    .sidebar a {
        display: block;
        color: white;
        text-decoration: none;
        padding: 10px;
        margin: 8px 0;
        border-radius: 5px;
        transition: 0.3s;
    }

    .sidebar a:hover {
        background-color: #495057;
    }

    /* Sidebar Dark Mode */
    body.dark-mode .sidebar {
        background-color: #1c1c1c;
    }

    body.dark-mode .sidebar a:hover {
        background-color: #333;
    }

    /* Main Content */
    .content {
        flex: 1;
        padding: 30px;
        transition: 0.3s;
    }

    body.dark-mode .content {
        background-color: #181818;
    }

    /* Card */
    .card {
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        transition: 0.3s;
    }

    body.dark-mode .card {
        background-color: #242424;
        color: white;
        box-shadow: 0 2px 10px rgba(255,255,255,0.05);
    }

</style>
</head>

<body>

<div class="header">
    <button class="toggle-btn" onclick="toggleDarkMode()">🌙 Dark Mode</button>
</div>

<div class="container">

    <div class="sidebar">
        <h2>Explore</h2>
        <a href="#">Home</a>
        <a href="#">Trending</a>
        <a href="#">Categories</a>
        <a href="#">Profile</a>
    </div>

    <div class="content">
        <h1>Welcome to Explore Page</h1>

        <div class="card">
            <h3>Feature 1</h3>
            <p>This is an advanced flexible explore page with dark mode.</p>
        </div>

        <div class="card">
            <h3>Feature 2</h3>
            <p>Sidebar also changes color when dark mode is enabled.</p>
        </div>

    </div>

</div>

<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
